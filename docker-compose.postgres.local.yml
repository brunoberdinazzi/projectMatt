services:
  postgres:
    image: postgres:17-alpine
    container_name: draux-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-draux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-draux}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - draux_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-draux} -d ${POSTGRES_DB:-draux}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  draux_pgdata:
